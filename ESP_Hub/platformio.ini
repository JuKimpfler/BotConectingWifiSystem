; ============================================================
;  PlatformIO – ESP_Hub
;  Hosts WebSocket UI, routes commands to satellites via ESP-NOW
;
;  Environments:
;    esp_hub      → ESP32-C3 (Seeed XIAO ESP32-C3, default)
;    esp_hub_c6   → ESP32-C6 (Seeed XIAO ESP32-C6)
;
;  Flash commands:
;    pio run -e esp_hub    -t upload && pio run -e esp_hub    -t uploadfs
;    pio run -e esp_hub_c6 -t upload && pio run -e esp_hub_c6 -t uploadfs
; ============================================================

[platformio]
default_envs = esp_hub
data_dir = data

; ── Shared settings ───────────────────────────────────────────
[hub_common]
framework    = arduino
monitor_speed = 115200
lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags_base =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -DDEVICE_ROLE=0
    -I../shared
extra_scripts = pre:scripts/pre_build_fs.py

; ── ESP32-C3 Hub (Seeed XIAO ESP32-C3) ───────────────────────
[env:esp_hub]
platform     = espressif32
board        = seeed_xiao_esp32c3
framework    = ${hub_common.framework}
monitor_speed = ${hub_common.monitor_speed}
lib_deps     = ${hub_common.lib_deps}
extra_scripts = ${hub_common.extra_scripts}

build_flags =
    ${hub_common.build_flags_base}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBCWS_TARGET_C3

board_build.filesystem = littlefs
; Exclude light-only source file from normal build
src_filter = +<*> -<main_light.cpp>

; ── ESP32-C6 Hub (Seeed XIAO ESP32-C6) ───────────────────────
; Uses the same source tree; -DBCWS_TARGET_C6 enables C6-specific
; pin definitions and ADC calibration path in hub_config.h /
; StatusLeds.cpp.
[env:esp_hub_c6]
platform     = espressif32
board        = seeed_xiao_esp32c6
framework    = ${hub_common.framework}
monitor_speed = ${hub_common.monitor_speed}
lib_deps     = ${hub_common.lib_deps}
extra_scripts = ${hub_common.extra_scripts}

build_flags =
    ${hub_common.build_flags_base}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBCWS_TARGET_C6

board_build.filesystem = littlefs
; Exclude light-only source file from normal build
src_filter = +<*> -<main_light.cpp>

; ── ESP32-C3 Hub Light (telemetry-only, domain: esp.light) ───
; Flash commands:
;   pio run -e esp_hub_light    -t upload && pio run -e esp_hub_light    -t uploadfs
[env:esp_hub_light]
platform     = espressif32
board        = seeed_xiao_esp32c3
framework    = ${hub_common.framework}
monitor_speed = ${hub_common.monitor_speed}
lib_deps     = ${hub_common.lib_deps}
extra_scripts = ${hub_common.extra_scripts}
; Light UI is built into data_light/ (separate from the full UI in data/)
data_dir     = data_light

build_flags =
    ${hub_common.build_flags_base}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBCWS_TARGET_C3
    -DHUB_LIGHT_MODE
    -DAP_SSID=\"ESP-Hub-Light\"
    -DAP_PASSWORD=\"hub12345\"
    -DDNS_HOSTNAME=\"esp.light\"
    -DTELEMETRY_MAX_HZ=50

board_build.filesystem = littlefs
; Exclude normal main; light main is compiled instead
src_filter = +<*> -<main.cpp>

; ── ESP32-C6 Hub Light (telemetry-only, domain: esp.light) ───
; Flash commands:
;   pio run -e esp_hub_c6_light -t upload && pio run -e esp_hub_c6_light -t uploadfs
[env:esp_hub_c6_light]
platform     = espressif32
board        = seeed_xiao_esp32c6
framework    = ${hub_common.framework}
monitor_speed = ${hub_common.monitor_speed}
lib_deps     = ${hub_common.lib_deps}
extra_scripts = ${hub_common.extra_scripts}
data_dir     = data_light

build_flags =
    ${hub_common.build_flags_base}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBCWS_TARGET_C6
    -DHUB_LIGHT_MODE
    -DAP_SSID=\"ESP-Hub-Light\"
    -DAP_PASSWORD=\"hub12345\"
    -DDNS_HOSTNAME=\"esp.light\"
    -DTELEMETRY_MAX_HZ=50

board_build.filesystem = littlefs
src_filter = +<*> -<main.cpp>
