; ============================================================
;  PlatformIO – ESP_Hub (ESP32-C3 #3, Seeed Studio XIAO)
;  Hosts WebSocket UI, routes commands to satellites via ESP-NOW
; ============================================================

[platformio]
default_envs = esp_hub
data_dir = data

[env:esp_hub]
platform     = espressif32
board        = seeed_xiao_esp32c3
framework    = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -DDEVICE_ROLE=0
    ; Add shared headers
    -I../shared

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    bblanchon/ArduinoJson @ ^7.2.0

board_build.filesystem = littlefs

; Automatically build the Vite Web UI (ESP_Hub/ui/) into ESP_Hub/data/
; before the LittleFS image is packed and uploaded.
; Run:  pio run -e esp_hub -t upload    → flash firmware
;        pio run -e esp_hub -t uploadfs  → build UI + upload LittleFS
extra_scripts = pre:scripts/pre_build_fs.py
