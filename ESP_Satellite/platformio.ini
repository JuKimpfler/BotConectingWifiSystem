; ============================================================
;  PlatformIO – ESP_Satellite (ESP32-C3, Seeed Studio XIAO)
;  Shared firmware for SAT1 (ESP #1) and SAT2 (ESP #2)
;  Select target via environment: esp_sat1 or esp_sat2
;  For USB-only mode (no Teensy UART TX/RX): esp_sat1_usb_bridge
;  or esp_sat2_usb_bridge
; ============================================================

[platformio]
default_envs = esp_sat2

[common]
platform     = espressif32
board        = seeed_xiao_esp32c3
framework    = arduino
monitor_speed = 115200
build_flags_base =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -I../shared

[env:esp_sat1]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags_base}
    -DSAT_ID=1
    -DDEVICE_ROLE=1

[env:esp_sat2]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags_base}
    -DSAT_ID=2
    -DDEVICE_ROLE=2

; ── USB-only environments (UART_BRIDGE_USB) ───────────────────
; All hardware UART payload traffic is redirected through USB Serial.
; Debug output on USB is disabled in this mode.

[env:esp_sat1_usb_bridge]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags_base}
    -DSAT_ID=1
    -DDEVICE_ROLE=1
    -DUART_BRIDGE_USB

[env:esp_sat2_usb_bridge]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags_base}
    -DSAT_ID=2
    -DDEVICE_ROLE=2
    -DUART_BRIDGE_USB
