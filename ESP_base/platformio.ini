; ╔══════════════════════════════════════════════════════╗
;  PlatformIO Konfiguration – ESP32 Mesh Hub Projekt
;  Board: Seeed Studio XIAO ESP32-C3
; ╚══════════════════════════════════════════════════════╝

[platformio]
default_envs = hub

; ── Gemeinsame Einstellungen ───────────────────────────
[common]
platform = espressif32
board    = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200

; XIAO ESP32-C3: USB-CDC Serial aktivieren
; (kein separater USB-UART-Chip wie beim DevKit!)
build_flags_base =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    bblanchon/ArduinoJson @ ^7.2.0

; ── ESP_2 HUB (mit Webserver) ──────────────────────────
[env:hub]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags_base}
    -DTHIS_DEVICE=2
src_filter  = +<esp2_hub.cpp>
lib_deps    = ${common.lib_deps}

; ── ESP_1 NODE ─────────────────────────────────────────
[env:node1]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags_base}
    -DTHIS_DEVICE=1
src_filter  = +<esp1_node.cpp>
lib_deps    =

; ── ESP_3 NODE ─────────────────────────────────────────
[env:node3]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags_base}
    -DTHIS_DEVICE=3
src_filter  = +<esp3_node.cpp>
lib_deps    =